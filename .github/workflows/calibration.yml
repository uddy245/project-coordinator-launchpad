name: Calibration corpus

# Runs the grading pipeline against the fixture corpus with the real
# Anthropic API. Costs ~$0.60 per run (5 Sonnet-4.5 grading calls).
#
# Triggers:
#   - workflow_dispatch: manual runs (any branch)
#   - pull_request: only when files that can affect grading change,
#     so PRs touching UI/content/infra don't burn API spend
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "src/lib/grading/**"
      - "src/lib/anthropic/**"
      - "docs/prompts/**"
      - "docs/rubrics/**"
      - "tests/fixtures/**"
      - "tests/integration/calibration.test.ts"
      - ".github/workflows/calibration.yml"

jobs:
  calibration:
    name: Run calibration corpus
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run calibration
        run: pnpm vitest run tests/integration/calibration.test.ts --reporter verbose
        env:
          RUN_CALIBRATION: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-5
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_PRICE_ID: price_placeholder
          GRADE_WORKER_SECRET: placeholder-grade-worker-secret-32-chars
